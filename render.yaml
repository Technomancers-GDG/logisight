# Render Blueprint for Resilient Essential Goods Coordinator
# To deploy: Go to render.com â†’ New + â†’ Blueprint â†’ Connect your repo
# Render will read this file and create the service automatically.

services:
  - type: web
    name: solv-hackathon
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: APP_NAME
        value: Resilient Essential Goods Coordinator
      - key: DATABASE_URL
        fromDatabase:
          name: solv-db
          property: connectionString
      - key: OSRM_BASE_URL
        value: https://router.project-osrm.org
      - key: SIMULATION_START_DATE
        value: 2026-01-01
      - key: SIMULATION_SPEED
        value: 120.0
      - key: NEWS_DATASET_PATH
        value: All_Cities_News_v2.xlsx
      - key: WEATHER_DATASET_PATH
        value: Historical_Weather_Data_2024_2026.xlsx
      - key: ALLOW_DEMO_SEED
        value: "true"
      - key: DEMO_MODE
        value: "true"
      - key: ROUTE_USE_OSRM
        value: "false"
      - key: USE_RL_ENGINE
        value: "true"
      - key: USE_NSGA2_OPTIMIZER
        value: "true"
      - key: BLOCKCHAIN_LEDGER_PATH
        value: data/blockchain_ledger.json
      - key: GCP_PROJECT_ID
        value: ""
      - key: GCP_REGION
        value: asia-south1
      - key: FIREBASE_ENABLED
        value: "false"
      - key: PUBSUB_ENABLED
        value: "false"
      - key: VERTEX_AI_ENABLED
        value: "false"
      - key: BIGQUERY_ENABLED
        value: "false"
      - key: FCM_ENABLED
        value: "false"
      - key: DEMO_DISRUPTION_DELAY_SECONDS
        value: "12"
      - key: DEMO_DISRUPTION_CITY
        value: Chennai
      - key: DEMO_DISRUPTION_SEVERITY
        value: "0.82"
      # ðŸ”´ IMPORTANT: Set your Gemini API key here or via Render Dashboard
      # Generate a key at https://aistudio.google.com/apikey
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: solv-db
    plan: starter
