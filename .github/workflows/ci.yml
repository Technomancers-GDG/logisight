name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DATABASE_URL: "sqlite:///./test.db"
  DEMO_MODE: "false"
  ALLOW_DEMO_SEED: "false"
  ROUTE_USE_OSRM: "false"
  GEMINI_API_KEY: "test-key"
  GROQ_API_KEY: "test-key"

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install ruff mypy
      - run: ruff check . --output-format=github
        continue-on-error: true
      - run: mypy main.py config.py database.py --ignore-missing-imports
        continue-on-error: true

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pytest-cov
      - name: Run backend tests with coverage
        run: python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term --cov-fail-under=20
        env:
          DATABASE_URL: sqlite:///./test.db
          DEMO_MODE: "false"
          ALLOW_DEMO_SEED: "false"
          ROUTE_USE_OSRM: "false"
          GEMINI_API_KEY: "test-key"
          GROQ_API_KEY: "test-key"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  test-frontend-admin:
    name: Test Frontend (Admin)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run --reporter=verbose
      - run: npm run build

  test-frontend-driver:
    name: Test Frontend (Driver)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: driver-app-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: driver-app-main/package-lock.json
      - run: npm ci
      - run: npx vitest run --reporter=verbose
      - run: npm run build

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements.txt
      - name: Build frontends for Docker
        run: |
          cd frontend && npm ci && npm run build && cd ..
          cd driver-app-main && npm ci && npm run build && cd ..
      - name: Build Docker image
        run: docker build -t logisight .
